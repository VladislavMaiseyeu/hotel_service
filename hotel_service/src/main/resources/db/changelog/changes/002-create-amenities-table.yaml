databaseChangeLog:
  - changeSet:
      id: 002-create-amenities-table
      author: vladislav
      changes:
        - createTable:
            tableName: amenities
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_amenities
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: amenities
            columnNames: name
            constraintName: uk_amenities_name