databaseChangeLog:
  - changeSet:
      id: 001-create-hotels-table
      author: vladislav
      changes:
        - createTable:
            tableName: hotels
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_hotels
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(2000)

              - column:
                  name: brand
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: house_number
                  type: INT

              - column:
                  name: street
                  type: VARCHAR(255)

              - column:
                  name: city
                  type: VARCHAR(255)

              - column:
                  name: country
                  type: VARCHAR(255)

              - column:
                  name: post_code
                  type: VARCHAR(50)

              - column:
                  name: phone
                  type: VARCHAR(100)

              - column:
                  name: email
                  type: VARCHAR(255)

              - column:
                  name: check_in
                  type: TIME

              - column:
                  name: check_out
                  type: TIME